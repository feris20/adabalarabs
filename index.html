<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أدب العرب</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Kufi+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="tailwind.js"></script>
  <script src="lucide.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen font-sans selection:bg-secondary/30 selection:text-primary relative transition-colors duration-500">
  <div class="noise-overlay"></div>
  
  <nav class="fixed top-0 left-0 right-0 p-4 lg:p-6 z-50 flex justify-end pointer-events-none">
    <div class="pointer-events-auto">
      <button id="theme-toggle" class="p-3 glass-panel rounded-full text-text-muted hover:text-primary transition-all active:scale-95 group">
        <i data-lucide="moon" id="theme-icon"></i>
      </button>
    </div>
  </nav>

  <!-- صفحة البداية -->
  <section id="page-home" class="page-section flex flex-col items-center justify-center p-6 min-h-screen text-center max-w-4xl mx-auto active-page">
    <div class="mb-8 relative animate-fade-in">
      <div class="absolute inset-0 bg-secondary/20 blur-3xl rounded-full"></div>
      <h1 class="text-7xl md:text-[7rem] font-serif font-bold text-transparent bg-clip-text bg-gradient-to-bl from-[#bf953f] via-[#fcf6ba] to-[#b38728] drop-shadow-sm mb-4 relative z-10 leading-tight py-2">
        أدب العرب
      </h1>
    </div>
    <p class="text-lg md:text-2xl text-text-muted leading-relaxed mb-16 max-w-2xl font-light animate-slide-up">
      ملاذك الرقمي لتذوق بلاغة الضاد، واكتشاف أوزان الشعر بأسلوب عصري وأنيق.
    </p>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full animate-slide-up">
      <button id="btn-nav-analysis" class="group glass-panel p-8 rounded-3xl text-right flex flex-col justify-end min-h-[220px] relative overflow-hidden">
        <div class="absolute top-6 left-6 text-primary/20 group-hover:text-primary/40 transition-colors">
          <i data-lucide="pen-tool" class="w-20 h-20" stroke-width="1"></i>
        </div>
        <div class="relative z-10">
          <span class="text-3xl font-bold font-serif mb-2 block text-text-main group-hover:text-primary">التحليل العروضي</span>
          <span class="text-sm text-text-muted font-light block">مقطّع شعري ذكي يبرز أوزان وتفعيلات أبياتك.</span>
        </div>
      </button>
      <button id="btn-nav-tests" class="group glass-panel p-8 rounded-3xl text-right flex flex-col justify-end min-h-[220px] relative overflow-hidden">
        <div class="absolute top-6 left-6 text-secondary/20 group-hover:text-secondary/40 transition-colors">
          <i data-lucide="check-circle-2" class="w-20 h-20" stroke-width="1"></i>
        </div>
        <div class="relative z-10">
          <span class="text-3xl font-bold font-serif mb-2 block text-text-main group-hover:text-secondary">ميدان المعرفة</span>
          <span class="text-sm text-text-muted font-light block">تحديات يومية في البلاغة والشعر وحفظ الأبيات.</span>
        </div>
      </button>
    </div>
  </section>

  <!-- صفحة التحديات -->
  <section id="page-tests" class="page-section p-6 md:p-12 max-w-6xl mx-auto py-20 hidden">
    <div class="flex flex-col items-start mb-12">
      <button id="btn-back-home-tests" class="flex items-center gap-2 text-text-muted hover:text-primary mb-6 transition-colors font-medium">
        <i data-lucide="arrow-right" class="w-4 h-4"></i> العودة للطليعة
      </button>
      <h2 class="text-5xl font-serif font-bold text-text-main">ميدان المعرفة</h2>
    </div>
    <div id="tests-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8"></div>
  </section>

  <!-- صفحة الاختبار النشط -->
  <section id="page-quiz" class="page-section min-h-screen flex items-center justify-center p-4 md:p-8 hidden">
    <div id="quiz-container" class="w-full max-w-2xl glass-panel p-8 md:p-12 rounded-[2.5rem] relative overflow-hidden">
      <div class="flex justify-between items-center mb-8">
        <div class="flex gap-1" dir="ltr" id="quiz-progress"></div>
        <span class="text-secondary font-mono tracking-widest uppercase text-xs font-bold" id="quiz-number">السؤال 1</span>
      </div>
      <h3 id="quiz-question" class="text-2xl md:text-4xl font-serif font-bold mb-12 leading-relaxed text-right text-text-main"></h3>
      <div id="quiz-options" class="flex flex-col gap-4"></div>
    </div>

    <div id="quiz-result" class="text-center glass-panel p-12 max-w-lg w-full rounded-[3rem] relative overflow-hidden hidden">
      <h3 class="text-3xl md:text-4xl font-serif font-bold mb-8 text-text-main">أنهيت التحدي</h3>
      <div class="relative inline-block mb-10 w-40 h-40">
        <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" fill="none" stroke="var(--color-border)" stroke-width="4" />
          <circle id="score-circle" cx="50" cy="50" r="45" fill="none" stroke="var(--color-primary)" stroke-width="4" stroke-dasharray="0 283" stroke-linecap="round" class="transition-all duration-1000 ease-out" />
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center font-bold text-text-main">
          <span class="text-5xl" id="score-text">0</span>
          <span class="text-text-muted text-sm border-t border-border mt-1 pt-1 w-1/3">2</span>
        </div>
      </div>
      <p id="score-message" class="mb-10 text-text-muted text-lg font-light"></p>
      <button id="btn-back-tests" class="bg-text-main text-bg px-10 py-4 rounded-full text-lg font-bold shadow-xl hover:bg-primary hover:text-white transition-all w-full">
        العودة للميدان
      </button>
    </div>
  </section>

  <!-- صفحة التحليل العروضي -->
  <section id="page-analysis" class="page-section p-4 md:p-8 max-w-7xl mx-auto py-12 lg:py-20 hidden">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-8 border-b border-border pb-8">
      <div>
        <button id="btn-back-home-analysis" class="flex items-center gap-2 text-text-muted hover:text-primary transition-colors text-sm font-medium mb-4">
          <i data-lucide="arrow-right" class="w-4 h-4"></i> تراجع
        </button>
        <h2 class="text-4xl font-serif font-bold text-text-main">مُحلل العَروض</h2>
      </div>
      <div class="flex gap-3 w-full md:w-auto">
        <button id="btn-fill-sample" class="px-6 py-3 glass-panel hover:bg-bg text-sm font-bold text-secondary rounded-full">تجربة بمثال</button>
        <button id="btn-clear-verses" class="px-6 py-3 glass-panel hover:bg-bg text-sm font-bold text-primary rounded-full">مسح الصحيفة</button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-16 items-start">
      <div id="verses-container" class="lg:col-span-7 space-y-6"></div>
      <div class="hidden lg:block lg:col-span-5 relative">
        <div class="sticky top-28" id="desktop-analysis-panel"></div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
