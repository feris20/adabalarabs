<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أدب العرب</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Kufi+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind CSS عبر CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Kufi Arabic"', 'sans-serif'],
            serif: ['Amiri', 'serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            primary: 'var(--color-primary)',
            secondary: 'var(--color-secondary)',
            bg: 'var(--color-bg)',
            surface: 'var(--color-surface)',
            'text-main': 'var(--color-text-main)',
            'text-muted': 'var(--color-text-muted)',
            border: 'var(--color-border)',
          }
        }
      }
    }
  </script>

  <!-- تنسيقات CSS الخاصة بك -->
  <style>
    :root {
      --color-primary: #9b2226;
      --color-secondary: #b89855;
      --color-bg: #f9f7f3;
      --color-surface: rgba(255, 255, 255, 0.65);
      --color-text-main: #18181b;
      --color-text-muted: #52525b;
      --color-border: rgba(0, 0, 0, 0.06);
      --glow-opacity: 0.35;
    }

    html.dark {
      --color-primary: #f26a6a;
      --color-secondary: #e6cfb3;
      --color-bg: #13100f;
      --color-surface: rgba(30, 26, 25, 0.75);
      --color-text-main: #fdfbf7;
      --color-text-muted: #a89f9a;
      --color-border: rgba(230, 207, 179, 0.12);
      --glow-opacity: 0.15;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-text-main);
      direction: rtl;
      transition: background-color 0.5s ease, color 0.5s ease;
      min-height: 100vh;
      font-family: var(--font-sans);
    }

    /* Ambient Glow Effects */
    body::before, body::after {
      content: "";
      position: fixed;
      width: 50vw;
      height: 50vw;
      border-radius: 50%;
      filter: blur(140px);
      z-index: -1;
      pointer-events: none;
      opacity: var(--glow-opacity);
      transition: opacity 0.5s ease;
    }

    body::before {
      background: radial-gradient(circle, var(--color-secondary) 0%, transparent 60%);
      top: -10vw;
      right: -10vw;
    }

    body::after {
      background: radial-gradient(circle, var(--color-primary) 0%, transparent 60%);
      bottom: -10vw;
      left: -10vw;
    }

    .noise-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.04;
    }
    html.dark .noise-overlay {
      opacity: 0.06;
    }

    /* Glassmorphism */
    .glass-panel {
      background: var(--color-surface);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid var(--color-border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    html.dark .glass-panel {
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .glass-panel:hover {
      border-color: rgba(184, 152, 85, 0.25);
    }

    html.dark .glass-panel:hover {
      border-color: rgba(212, 175, 55, 0.25);
    }

    input::placeholder {
      color: var(--color-text-muted);
      opacity: 0.5;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--color-border);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--color-text-muted);
    }
  </style>

  <!-- React و ReactDOM و Babel للعمل مباشرة في المتصفح -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- مكتبات Motion و Lucide -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>
</head>
<body class="selection:bg-secondary/30 selection:text-primary relative transition-colors duration-500">
  <div class="noise-overlay"></div>
  <div id="root"></div>

  <!-- نوع السكريبت text/babel لكي يتم تحويل الـ JSX إلى JS اعتيادي -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = window.Motion;
    const { ChevronLeft, RotateCcw, PenTool, CheckCircle2, Moon, Sun, ArrowLeft, BookOpen, Quote, Target, Feather } = window.lucideReact;

    // --- Utils ---
    function analyzeVerses(text) {
      if (!text.trim()) return { phonetic: "", symbols: "", meter: "..." };
      let phonetic = text.replace(/الت/g, "تت").replace(/اً/g, "ان").replace(/ة/g, "ت");
      let symbols = "";
      for (let i = 0; i < text.length; i++) {
        if (text[i] === " ") continue;
        symbols += i % 3 === 0 ? "o" : "/";
      }
      const meters = ["الطويل", "الكامل", "البسيط", "الوافر"];
      const meter = text.length > 5 ? meters[Math.floor(Math.random() * meters.length)] : "...";
      return { phonetic, symbols, meter };
    }

    const SAMPLE_VERSES = [
      "قِفَا نَبْكِ مِنْ ذِكْرَى حَبِيبٍ ومَنْزِلِ",
      "بِسِقْطِ اللِّوَى بَيْنَ الدَّخُولِ فَحَوْمَلِ",
      "إِذَا الشعبُ يوماً أرادَ الحياةَ",
      "فلا بدَّ أنْ يستجيبَ القدرْ"
    ];

    // --- Data ---
    const QUIZZES = {
      complete: [
        { question: "الخيلُ والليلُ والبيداءُ تعرفُني... والرمحُ والقرطاسُ و____", options: ["السيفُ", "القلمُ", "الكتابُ", "الحبرُ"], correct: 1 },
        { question: "وما حبُّ الديارِ شغفنَ قلبي... ولكن حبُّ من ____", options: ["بنى الديارا", "سكنَ الديارا", "هجرَ الديارا", "زارَ الديارا"], correct: 1 }
      ],
      meter: [
        { question: "ما البحر الذي وزنه: فعولن مفاعيلن فعولن مفاعلن؟", options: ["الطويل", "الكامل", "البسيط", "الوافر"], correct: 0 },
        { question: "على أي بحر نظم الشوقي نهج البردة؟", options: ["البسيط", "الخفيف", "الوافر", "الكامل"], correct: 1 }
      ],
      poet: [
        { question: "من القائل: نَقِّل فُؤادَكَ حَيثُ شِئتَ مِنَ الهَوى... ما الحُبُّ إِلّا لِلحَبيبِ الأَوَّلِ؟", options: ["المتنبي", "أبو تمام", "بشار بن برد", "البحتري"], correct: 1 },
        { question: "من الملقب بـ شاعر النيل؟", options: ["أحمد شوقي", "حافظ إبراهيم", "إيليا أبو ماضي", "خليل مطران"], correct: 1 }
      ],
      rhetoric: [
        { question: "ما نوع التشبيه في: 'العمر مثل الضيف'؟", options: ["بليغ", "مجمل", "مرسل", "مؤكد"], correct: 2 },
        { question: "ما الغرض من الاستفهام في قوله تعالى: 'أليس الله بأحكم الحاكمين'؟", options: ["التقرير", "التعجب", "النفي", "التمني"], correct: 0 }
      ]
    };

    // --- App Component ---
    function App() {
      const [page, setPage] = useState('home');
      const [activeQuiz, setActiveQuiz] = useState(null);
      const [quizIndex, setQuizIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [showResult, setShowResult] = useState(false);
      const [darkMode, setDarkMode] = useState(false);

      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      // Analysis State
      const [verses, setVerses] = useState(['', '', '', '']);
      const [activeIndex, setActiveIndex] = useState(0);
      const [analysis, setAnalysis] = useState({ meter: '...', symbols: '', phonetic: '' });
      const activeInputRef = useRef(null);

      useEffect(() => {
        const currentText = verses[activeIndex];
        setAnalysis(analyzeVerses(currentText || ''));
      }, [verses, activeIndex]);

      useEffect(() => {
        if (activeInputRef.current) {
          activeInputRef.current.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }, [activeIndex]);

      // Handlers
      const handleQuizStart = (type) => {
        setActiveQuiz(type);
        setQuizIndex(0);
        setScore(0);
        setShowResult(false);
        setPage('quiz');
      };

      const handleAnswer = (index) => {
        if (index === QUIZZES[activeQuiz][quizIndex].correct) {
          setScore(s => s + 1);
        }
        if (quizIndex < 1) {
          setQuizIndex(1);
        } else {
          setShowResult(true);
        }
      };

      const fillSample = () => {
        setVerses(SAMPLE_VERSES);
        setActiveIndex(0);
      };

      const clearVerses = () => {
        setVerses(['', '', '', '']);
        setActiveIndex(0);
      };

      const handleVerseChange = (idx, value) => {
        const newVerses = [...verses];
        newVerses[idx] = value;
        
        if (idx === verses.length - 1 && value.trim() !== '' && idx % 2 === 1) {
          newVerses.push('', '');
        }
        
        setVerses(newVerses);
        setActiveIndex(idx);
      };

      const AnalysisPanel = ({ className = "" }) => (
        <div className={`glass-panel rounded-3xl overflow-hidden flex flex-col ${className}`}>
          <div className="bg-gradient-to-l from-primary/10 to-transparent p-6 lg:p-8 border-b border-border relative overflow-hidden">
            <div className="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full blur-2xl -mr-16 -mt-16 pointer-events-none" />
            <span className="text-xs uppercase tracking-widest font-bold text-secondary block mb-2">البحر الشعري</span>
            <h3 className="text-4xl lg:text-5xl font-serif font-bold text-transparent bg-clip-text bg-gradient-to-b from-text-main to-text-muted">{analysis.meter}</h3>
          </div>
          
          <div className="p-6 lg:p-8 space-y-8 flex-grow">
            <div>
              <span className="text-sm font-bold text-text-muted block mb-3">الترميز العروضي</span>
              <div className="text-2xl lg:text-3xl font-mono tracking-[0.5em] text-center bg-bg/50 py-4 rounded-2xl text-primary border border-border shadow-inner" dir="ltr">
                {analysis.symbols || "----"}
              </div>
            </div>

            <div>
              <span className="text-sm font-bold text-text-muted block mb-3">الكتابة العروضية</span>
              <div className="text-xl lg:text-2xl font-serif text-right text-text-main/90 leading-relaxed bg-bg/30 p-5 rounded-2xl italic min-h-[90px] border border-border/50">
                {analysis.phonetic || "بانتظار الإلهام يتدفق من قلمك..."}
              </div>
            </div>
          </div>

          <div className="p-4 text-center border-t border-border bg-black/5 dark:bg-white/5">
            <span className="text-[11px] font-medium text-text-muted flex items-center justify-center gap-2">
              <Feather size={12} className="text-secondary" />
              مبني على قواعد العروض للفراهيدي
            </span>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen font-sans">
          
          {/* Top Navigation */}
          <nav className="fixed top-0 left-0 right-0 p-4 lg:p-6 z-50 flex justify-end pointer-events-none">
            <div className="pointer-events-auto">
              <button 
                onClick={() => setDarkMode(!darkMode)}
                className="p-3 glass-panel rounded-full text-text-muted hover:text-primary transition-all active:scale-95 group"
                title="تغيير المظهر"
              >
                <motion.div
                  initial={false}
                  animate={{ rotate: darkMode ? 180 : 0 }}
                  transition={{ duration: 0.5, type: "spring" }}
                >
                  {darkMode ? <Sun size={20} className="group-hover:text-secondary" /> : <Moon size={20} className="group-hover:text-primary" />}
                </motion.div>
              </button>
            </div>
          </nav>

          <AnimatePresence mode="wait">
            {page === 'home' && (
              <motion.div 
                key="home"
                initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, scale: 1.05 }}
                transition={{ duration: 0.6, ease: [0.16, 1, 0.3, 1] }}
                className="flex flex-col items-center justify-center p-6 min-h-screen text-center max-w-4xl mx-auto"
              >
                <motion.div 
                  initial={{ scale: 0.9, opacity: 0 }}
                  animate={{ scale: 1, opacity: 1 }}
                  transition={{ delay: 0.2, duration: 0.8 }}
                  className="mb-8 relative"
                >
                  <div className="absolute inset-0 bg-secondary/20 blur-3xl rounded-full" />
                  <h1 className="text-7xl md:text-[7rem] font-serif font-bold text-transparent bg-clip-text bg-gradient-to-bl from-primary via-primary to-secondary drop-shadow-sm mb-4 relative z-10 leading-tight py-2">
                    أدب العرب
                  </h1>
                </motion.div>

                <motion.p 
                  initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.4 }}
                  className="text-lg md:text-2xl text-text-muted leading-relaxed mb-16 max-w-2xl font-light"
                >
                  ملاذك الرقمي لتذوق بلاغة الضاد، واكتشاف أوزان الشعر، وخوض تحديات المعرفة الأدبية بأسلوب عصري وأنيق.
                </motion.p>
                
                <motion.div 
                  initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.5 }}
                  className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full"
                >
                  <button 
                    onClick={() => setPage('analysis')}
                    className="group glass-panel p-8 rounded-3xl text-right flex flex-col justify-end min-h-[220px] relative overflow-hidden"
                  >
                    <div className="absolute top-6 left-6 text-primary/20 group-hover:text-primary/40 transition-colors duration-500">
                      <PenTool size={80} strokeWidth={1} />
                    </div>
                    <div className="relative z-10">
                      <span className="text-3xl font-bold font-serif mb-2 block text-text-main group-hover:text-primary transition-colors">التحليل العروضي</span>
                      <span className="text-sm text-text-muted font-light block">مقطّع شعري ذكي يبرز أوزان وتفعيلات أبياتك.</span>
                    </div>
                    <div className="absolute bottom-8 left-8 opacity-0 -translate-x-4 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300">
                      <ArrowLeft className="text-primary" />
                    </div>
                  </button>
                  
                  <button 
                    onClick={() => setPage('tests')}
                    className="group glass-panel p-8 rounded-3xl text-right flex flex-col justify-end min-h-[220px] relative overflow-hidden"
                  >
                    <div className="absolute top-6 left-6 text-secondary/20 group-hover:text-secondary/40 transition-colors duration-500">
                      <CheckCircle2 size={80} strokeWidth={1} />
                    </div>
                    <div className="relative z-10">
                      <span className="text-3xl font-bold font-serif mb-2 block text-text-main group-hover:text-secondary transition-colors">ميدان المعرفة</span>
                      <span className="text-sm text-text-muted font-light block">تحديات يومية في البلاغة والشعر وحفظ الأبيات.</span>
                    </div>
                    <div className="absolute bottom-8 left-8 opacity-0 -translate-x-4 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300">
                      <ArrowLeft className="text-secondary" />
                    </div>
                  </button>
                </motion.div>
              </motion.div>
            )}

            {page === 'tests' && (
              <motion.div 
                key="tests"
                initial={{ opacity: 0, scale: 0.98 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0 }}
                transition={{ duration: 0.5 }}
                className="p-6 md:p-12 max-w-6xl mx-auto py-20"
              >
                <div className="flex flex-col items-start mb-12">
                  <button onClick={() => setPage('home')} className="flex items-center gap-2 text-text-muted hover:text-primary mb-6 transition-colors font-medium">
                    <ArrowLeft size={18} /> العودة للطليعة
                  </button>
                  <h2 className="text-5xl font-serif font-bold text-text-main">ميدان المعرفة</h2>
                  <p className="text-text-muted mt-3 text-lg">اختر التحدي الذي يناسب ذائقتك الأدبية.</p>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">
                  {[
                    { id: 'complete', title: 'أكمل الفراغ', desc: 'اختبر حصيلتك من أبيات الشعر الخالدة', icon: Quote, color: 'from-orange-500/20 to-red-500/20', img: 'https://images.unsplash.com/photo-1544648151-55737bb41329?auto=format&fit=crop&q=80&w=600' },
                    { id: 'meter', title: 'فراسة البحور', desc: 'هل تستطيع تمييز البحر من نظرة؟', icon: Target, color: 'from-emerald-500/20 to-teal-500/20', img: 'https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&q=80&w=600' },
                    { id: 'poet', title: 'من القائل', desc: 'أعد كل بيت مجيد إلى قائله', icon: Feather, color: 'from-blue-500/20 to-indigo-500/20', img: 'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?auto=format&fit=crop&q=80&w=600' },
                    { id: 'rhetoric', title: 'أسرار البلاغة', desc: 'سبر أغوار الجمال البياني في لغتنا', icon: BookOpen, color: 'from-purple-500/20 to-pink-500/20', img: 'https://images.unsplash.com/photo-1503454537195-0df99d4b600d?auto=format&fit=crop&q=80&w=600' },
                  ].map((item, idx) => {
                    const Icon = item.icon;
                    return (
                      <motion.button
                        key={item.id}
                        initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: idx * 0.1 }}
                        onClick={() => handleQuizStart(item.id)}
                        className="group glass-panel rounded-3xl h-[280px] flex flex-col justify-end overflow-hidden relative text-right hover:scale-[1.01] transition-transform"
                      >
                        <div className="absolute inset-0 z-0">
                          <img src={item.img} alt={item.title} className="w-full h-full object-cover opacity-30 dark:opacity-20 mix-blend-overlay group-hover:scale-105 transition-transform duration-700" />
                          <div className={`absolute inset-0 bg-gradient-to-t ${item.color} mix-blend-multiply opacity-50`} />
                          <div className="absolute inset-0 bg-gradient-to-t from-bg via-bg/80 to-transparent" />
                        </div>
                        
                        <div className="relative z-10 p-8 w-full flex flex-col gap-2">
                           <div className="w-12 h-12 rounded-xl bg-text-main text-bg flex items-center justify-center mb-2 shadow-lg group-hover:-translate-y-1 transition-transform">
                              <Icon size={24} />
                           </div>
                          <span className="text-3xl font-serif font-bold text-text-main">{item.title}</span>
                          <span className="text-text-muted font-light">{item.desc}</span>
                        </div>
                      </motion.button>
                    )
                  })}
                </div>
              </motion.div>
            )}

            {page === 'quiz' && activeQuiz && (
              <motion.div 
                key="quiz"
                initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}
                className="min-h-screen flex items-center justify-center p-4 md:p-8"
              >
                {!showResult ? (
                  <div className="w-full max-w-2xl glass-panel p-8 md:p-12 rounded-[2.5rem] relative overflow-hidden">
                    <div className="flex justify-between items-center mb-8">
                       <div className="flex gap-1" dir="ltr">
                         {[0,1].map(i => (
                            <div key={i} className={`h-1.5 w-10 rounded-full ${i <= quizIndex ? 'bg-primary' : 'bg-border'}`} />
                         ))}
                       </div>
                       <span className="text-secondary font-mono tracking-widest uppercase text-xs font-bold">السؤال {quizIndex + 1}</span>
                    </div>
                    
                    <h3 className="text-2xl md:text-4xl font-serif font-bold mb-12 leading-relaxed text-right text-text-main">
                      {QUIZZES[activeQuiz][quizIndex].question}
                    </h3>
                    
                    <div className="flex flex-col gap-4">
                      {QUIZZES[activeQuiz][quizIndex].options.map((opt, i) => (
                        <motion.button
                          key={i}
                          whileHover={{ scale: 1.01, x: -5 }} whileTap={{ scale: 0.99 }}
                          onClick={() => handleAnswer(i)}
                          className="p-5 glass-panel !bg-transparent border border-border rounded-2xl text-right text-lg md:text-xl font-medium hover:!border-primary hover:text-primary transition-all shadow-sm flex justify-between items-center group"
                        >
                          <span>{opt}</span>
                          <div className="w-6 h-6 rounded-full border-2 border-border group-hover:border-primary flex items-center justify-center transition-colors">
                            <div className="w-2 h-2 rounded-full bg-primary opacity-0 group-hover:opacity-100 transition-opacity" />
                          </div>
                        </motion.button>
                      ))}
                    </div>
                  </div>
                ) : (
                  <motion.div 
                    initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }}
                    className="text-center glass-panel p-12 max-w-lg w-full rounded-[3rem] relative overflow-hidden"
                  >
                    <div className="absolute inset-0 bg-gradient-to-b from-secondary/10 to-transparent pointer-events-none" />
                    <h3 className="text-3xl md:text-4xl font-serif font-bold mb-8 text-text-main relative z-10">أنهيت التحدي</h3>
                    
                    <div className="relative inline-block mb-10 w-40 h-40">
                       <svg className="w-full h-full -rotate-90" viewBox="0 0 100 100">
                         <circle cx="50" cy="50" r="45" fill="none" stroke="var(--color-border)" strokeWidth="4" />
                         <circle cx="50" cy="50" r="45" fill="none" stroke="var(--color-primary)" strokeWidth="4" 
                            strokeDasharray={`${(score/2)*283} 283`} strokeLinecap="round" className="transition-all duration-1000 ease-out" />
                       </svg>
                       <div className="absolute inset-0 flex flex-col items-center justify-center font-bold text-text-main">
                         <span className="text-5xl">{score}</span>
                         <span className="text-text-muted text-sm border-t border-border mt-1 pt-1 w-1/3">2</span>
                       </div>
                    </div>
                    
                    <p className="mb-10 text-text-muted text-lg font-light relative z-10">
                       {score === 2 ? 'مذهل! لقد أثبتّ جدارتك.' : 'لا بأس، المعرفة تراكمية.'}
                    </p>
                    
                    <button 
                      onClick={() => setPage('tests')}
                      className="bg-text-main text-bg px-10 py-4 rounded-full text-lg font-bold shadow-xl hover:bg-primary hover:text-white transition-all relative z-10 block w-full"
                    >
                      العودة للميدان
                    </button>
                  </motion.div>
                )}
              </motion.div>
            )}

            {page === 'analysis' && (
              <motion.div 
                key="analysis"
                initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }}
                className="p-4 md:p-8 max-w-7xl mx-auto py-12 lg:py-20"
              >
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-8 border-b border-border pb-8">
                  <div>
                    <button onClick={() => setPage('home')} className="flex items-center gap-2 text-text-muted hover:text-primary transition-colors text-sm font-medium mb-4">
                      <ArrowLeft size={16} /> تراجع
                    </button>
                    <h2 className="text-4xl font-serif font-bold text-text-main">مُحلل العَروض</h2>
                    <p className="text-text-muted mt-2">اكتب أبياتك وشاهد السحر العروضي مباشرة.</p>
                  </div>
                  
                  <div className="flex gap-3 w-full md:w-auto">
                    <button 
                      onClick={fillSample}
                      className="flex-1 md:flex-none px-6 py-3 glass-panel hover:bg-bg !border-secondary/30 text-sm font-bold text-secondary hover:text-secondary shadow-sm transition-all rounded-full"
                    >
                      تجربة بمثال
                    </button>
                    <button 
                      onClick={clearVerses}
                      className="flex-1 md:flex-none px-6 py-3 glass-panel hover:bg-bg !border-primary/30 text-sm font-bold text-primary hover:text-primary shadow-sm transition-all rounded-full"
                    >
                      مسح الصحيفة
                    </button>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-16 items-start lg:items-stretch relative">
                  <div className="lg:col-span-7 space-y-6">
                    {verses.map((verse, idx) => {
                      const isSadr = idx % 2 === 0;
                      const isActive = activeIndex === idx;
                      
                      return (
                        <div key={idx} className="flex flex-col">
                          <motion.div 
                            initial={{ opacity: 0, x: -10 }} animate={{ opacity: 1, x: 0 }} 
                            className={`flex items-start gap-4 transition-all duration-300 ${isActive ? 'scale-[1.02] z-10' : 'opacity-60 hover:opacity-100'}`}
                          >
                            <div className="w-10 pt-4 flex justify-center text-text-muted/40 font-mono text-sm select-none">
                               {isSadr ? String(Math.floor(idx/2)+1).padStart(2,'0') : <span className="rotate-180"><ChevronLeft size={16} /></span>}
                            </div>
                            
                            <div className="flex-grow relative">
                              <input
                                ref={isActive ? activeInputRef : null}
                                type="text"
                                value={verse}
                                onChange={(e) => handleVerseChange(idx, e.target.value)}
                                onFocus={() => setActiveIndex(idx)}
                                placeholder={isSadr ? "الشطر الأول (الصدر)" : "الشطر الثاني (العجز)"}
                                className={`w-full p-4 md:p-6 text-2xl md:text-3xl font-serif bg-transparent border-b-2 transition-all focus:outline-none placeholder:text-text-muted/30
                                    ${isActive ? 'border-primary text-text-main drop-shadow-md' : 'border-border text-text-main/80'}
                                `}
                              />
                              {isActive && (
                                <motion.div layoutId="active-line" className="absolute bottom-0 left-0 right-0 h-0.5 bg-primary rounded-full shadow-[0_0_8px_rgba(155,34,38,0.6)] dark:shadow-[0_0_8px_rgba(230,57,70,0.6)]" />
                              )}
                            </div>
                          </motion.div>

                          <AnimatePresence>
                            {isActive && (
                              <motion.div 
                                initial={{ opacity: 0, height: 0 }} 
                                animate={{ opacity: 1, height: 'auto' }} 
                                exit={{ opacity: 0, height: 0 }} 
                                className="lg:hidden pl-14 overflow-hidden mt-6"
                              >
                                <AnalysisPanel />
                              </motion.div>
                            )}
                          </AnimatePresence>
                        </div>
                      );
                    })}
                  </div>

                  <div className="hidden lg:block lg:col-span-5 relative">
                    <div className="sticky top-28">
                      <AnalysisPanel className="min-h-[400px]" />
                    </div>
                  </div>
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    }

    // --- Render ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
